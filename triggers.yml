name: Triggers
run-name: ¡estoy aprendiendo a usar diferentes Triggers!
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '**.py'
  issues:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      lenguaje_favorito:
        description: 'Lenguaje Favorito'
        default: Python
        required: true
        type: choice
        options:
          - Python
          - JavaScript
          - Go
      nombre:
        description: 'Tu nombre'
        required: true
        default: Jose
        type: string
    schedule:
      - cron: '15 22 * * *'
  jobs:
    hola-mundo-manual:
      runs-on: ubuntu-latest
      steps:
        - name: checkout
          uses: actions/checkout@v3
        - name: Definir Nombre
          run: echo "USERNAME=${{ imput.nombre }}" >> $GITHUB_ENV
        - name: Correr Script
          run: python hola_lenguaje.py
    hola-mundo:
      if: ${{github,event_name != 'workflow_dispatch'}}
      runs-on: ubuntu-latest
      steps:
        - name: checkout
          uses: actions/checkout@v3
        - name: Definir variable
          run: echo "USERNAME=${{ github.actor }}" >> $GITHUB_ENV
        - name: Correr Script
          run: python hola_mundo.py
        
            
